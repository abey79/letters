name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install openscad, just, and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            openscad just fonts-liberation

      - name: Render all letters
        run: just all

      - name: Upload STLs
        uses: actions/upload-artifact@v4
        with:
          name: letter-stls
          path: build/*.stl
          if-no-files-found: error
