name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [letter-tags, karcher-wd2-adapter]
    steps:
      - uses: actions/checkout@v4

      - name: Install just, fonts, and OpenSCAD runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            just fonts-liberation \
            libegl1 libgl1 libglu1-mesa libopengl0 \
            libxkbcommon0 libxrender1 libxext6 libxi6 libfontconfig1

      - name: Install OpenSCAD snapshot (lazy-union needs >= 2024)
        run: |
          set -euo pipefail
          latest=$(curl -fsSL https://files.openscad.org/snapshots/ \
            | grep -oE 'OpenSCAD-[0-9.]+-x86_64\.AppImage' \
            | sort -u | tail -1)
          echo "Installing $latest"
          curl -fsSL -o openscad.AppImage "https://files.openscad.org/snapshots/$latest"
          chmod +x openscad.AppImage
          ./openscad.AppImage --appimage-extract > /dev/null
          sudo mv squashfs-root /opt/openscad
          sudo ln -sf /opt/openscad/AppRun /usr/local/bin/openscad
          openscad --version

      - name: Render ${{ matrix.project }}
        working-directory: projects/${{ matrix.project }}
        run: just all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}
          path: projects/${{ matrix.project }}/build/*
          if-no-files-found: error
